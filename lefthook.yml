pre-commit:
  parallel: false
  commands:
    fmt:
      glob: "**/*.rs"
      run: cargo fmt --check
      fail_text: "Run `cargo fmt` to fix formatting"
    check:
      glob: "**/*.rs"
      run: RUSTFLAGS="-D warnings" cargo check --all-targets
      fail_text: "Fix build warnings before committing"
    clippy:
      glob: "**/*.rs"
      run: cargo clippy --all-targets -- -D warnings
      fail_text: "Fix clippy warnings before committing"
    no-js:
      run: "! git diff --cached --name-only --diff-filter=ACR | grep '\\.js$' | grep -v '^packages/rex/bin/' | grep -q ."
      fail_text: "Do not commit .js files — use TypeScript (.ts/.tsx) instead"
    oxlint:
      glob: "**/*.{ts,tsx,js,jsx}"
      run: oxlint --deny-warnings runtime/ packages/rex/src/ benchmarks/
      fail_text: "Fix oxlint warnings before committing"
    typecheck:
      glob: "runtime/**/*.{ts,tsx}"
      run: cd runtime && { [ -d node_modules ] || npm install --no-package-lock --ignore-scripts --no-audit --no-fund; } && npm run typecheck
      fail_text: "Fix TypeScript errors in runtime/"
    typecheck-fixtures:
      glob: "**/*.{ts,tsx}"
      run: scripts/typecheck-fixtures.sh
      fail_text: "Fix TypeScript errors in fixtures/benchmarks before committing"
    file-length:
      run: scripts/check-file-length.sh --staged
      fail_text: "Files must not exceed 700 lines — split large files into smaller modules"

commit-msg:
  commands:
    conventional-commit:
      run: .claude/hooks/check-commit-msg.sh {1}
      fail_text: |
        Commit message must follow Conventional Commits (required by release-please).
        Format: type(scope): description
        Types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert

pre-push:
  parallel: false
  commands:
    e2e:
      run: cargo build -p rex_cli && cargo test -p rex_e2e --lib -- --ignored
      fail_text: "E2E tests must pass before pushing"
    coverage:
      run: |
        COVERAGE_THRESHOLD=$(cat .coverage-threshold | tr -d '[:space:]')
        cargo llvm-cov --workspace --exclude rex_python --ignore-filename-regex 'tests/' --json --output-path coverage.json
        COVERAGE=$(jq '.data[0].totals.lines.percent | floor' coverage.json)
        echo "Line coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD}%)"
        if [ "$COVERAGE" -lt "$COVERAGE_THRESHOLD" ]; then
          echo "Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
          exit 1
        fi
        rm -f coverage.json
      fail_text: "Coverage is below the threshold in .coverage-threshold"
