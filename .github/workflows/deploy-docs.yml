name: Deploy Docs

on:
  workflow_call:
    inputs:
      version:
        description: "Version string to display in the docs sidebar"
        required: true
        type: string
      docker-tag:
        description: "GHCR image tag to use for rex export (e.g. latest-build, beta-build)"
        required: false
        type: string
        default: "latest-build"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: docs

      - name: Inject version
        run: echo 'export const VERSION = "${{ inputs.version }}";' > docs/lib/version.ts

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export docs site
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work/docs \
            ghcr.io/limlabs/rex:${{ inputs.docker-tag }} \
            rex export --force --base-path /rex

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.rex/export

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
