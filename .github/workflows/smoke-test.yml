name: Smoke Test

on:
  workflow_call:
    inputs:
      version:
        description: "Package version to install (e.g. 0.9.0 or 0.9.0-beta.42)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke-test:
    name: ${{ matrix.fixture }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture: [basic, tailwind, mcp, app-router, custom-server, railway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rewrite @limlabs/rex to published version
        run: |
          VERSION="${INPUT_VERSION#v}"
          cd "fixtures/${{ matrix.fixture }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const section of ['dependencies', 'devDependencies']) {
              if (pkg[section] && pkg[section]['@limlabs/rex']) {
                pkg[section]['@limlabs/rex'] = '${VERSION}';
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          INPUT_VERSION: ${{ inputs.version }}

      - name: Wait for package on npm registry
        run: |
          VERSION="${INPUT_VERSION#v}"
          echo "Waiting for @limlabs/rex@$VERSION..."
          for i in $(seq 1 30); do
            if npm view "@limlabs/rex@$VERSION" version 2>/dev/null; then
              echo "@limlabs/rex@$VERSION is available"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Timed out waiting for @limlabs/rex@$VERSION on npm"
              exit 1
            fi
            sleep 10
          done
        env:
          INPUT_VERSION: ${{ inputs.version }}

      - name: Install dependencies
        run: cd "fixtures/${{ matrix.fixture }}" && npm install

      - name: rex build
        run: npx rex build
        working-directory: fixtures/${{ matrix.fixture }}

      - name: rex start (verify HTTP 200)
        run: |
          npx rex start --port 3000 &
          REX_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Server failed to start within 30s"
              kill $REX_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/)
          echo "GET / → HTTP $STATUS"
          kill $REX_PID 2>/dev/null || true

          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Expected HTTP 200, got $STATUS"
            exit 1
          fi
        working-directory: fixtures/${{ matrix.fixture }}
