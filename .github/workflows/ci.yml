name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --all-targets

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: oxlint
        run: npx oxlint runtime/ packages/rex/src/

      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty after build"
            git status --porcelain
            exit 1
          fi

  test:
    name: Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install fixture dependencies
        run: cd fixtures/basic && npm install

      - name: cargo test
        run: cargo test --all

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    env:
      COVERAGE_THRESHOLD: 47
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cov-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install fixture dependencies
        run: cd fixtures/basic && npm install

      - name: Run coverage
        run: |
          cargo llvm-cov --all --json --output-path coverage.json
          COVERAGE=$(jq '.data[0].totals.lines.percent' coverage.json | xargs printf '%.0f')
          echo "Line coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD}%)"
          if [ "$COVERAGE" -lt "$COVERAGE_THRESHOLD" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
