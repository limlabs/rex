name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  check:
    name: Check & Lint
    if: ${{ !startsWith(github.head_ref || '', 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --all-targets

      - name: Install runtime dependencies
        run: cd runtime && npm ci

      - name: TypeScript strict check (runtime)
        run: cd runtime && npm run typecheck

      - name: TypeScript strict check (fixtures & benchmarks)
        run: scripts/typecheck-fixtures.sh

      - name: File length check
        run: scripts/check-file-length.sh --diff origin/${{ github.base_ref || 'main' }}

      - name: oxlint
        run: npx oxlint --deny-warnings runtime/ packages/rex/src/ benchmarks/

  test:
    name: Test & Coverage
    if: ${{ !startsWith(github.head_ref || '', 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run rex_python tests
        run: cargo test -p rex_python

      - name: Run tests with coverage
        run: |
          COVERAGE_THRESHOLD=$(cat .coverage-threshold | tr -d '[:space:]')
          cargo llvm-cov --workspace --exclude rex_python --ignore-filename-regex 'tests/' --json --output-path coverage.json
          COVERAGE=$(jq '.data[0].totals.lines.percent | floor' coverage.json)
          echo "Line coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD}%)"
          if [ "$COVERAGE" -lt "$COVERAGE_THRESHOLD" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          fi

  e2e:
    name: E2E Tests
    if: ${{ !startsWith(github.head_ref || '', 'release-please--') }}
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build rex binary
        run: cargo build -p rex_cli

      - name: Run e2e tests
        run: cargo test -p rex_e2e --lib -- --ignored

  docker:
    name: Docker Build
    if: ${{ !startsWith(github.head_ref || '', 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build rex images
        run: docker buildx bake --load

      - name: Build railway fixture
        run: docker build --build-arg REX_VERSION=ci -t rex-railway-fixture fixtures/railway
