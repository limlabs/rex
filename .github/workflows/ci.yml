name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --all-targets

      - name: Install runtime dependencies
        run: cd runtime && npm ci

      - name: TypeScript strict check (runtime)
        run: cd runtime && npm run typecheck

      - name: TypeScript strict check (fixtures & benchmarks)
        run: scripts/typecheck-fixtures.sh

      - name: oxlint
        run: cargo run -p rex_cli -- lint --deny-warnings runtime/ packages/rex/src/ fixtures/ benchmarks/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          COVERAGE_THRESHOLD=$(cat .coverage-threshold | tr -d '[:space:]')
          cargo llvm-cov --workspace --exclude rex_python --json --output-path coverage.json
          COVERAGE=$(jq '.data[0].totals.lines.percent' coverage.json | xargs printf '%.0f')
          echo "Line coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD}%)"
          if [ "$COVERAGE" -lt "$COVERAGE_THRESHOLD" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          fi

  python:
    name: Python Extension Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          python: "true"

      - name: Run Rust unit tests
        run: cargo test -p rex_python

      - name: Build and install rex-py
        run: cd crates/rex_python && maturin develop

      - name: Run Python tests
        run: pytest crates/rex_python/tests/ -v

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build rex binary
        run: cargo build -p rex_cli

      - name: Run e2e tests
        run: cargo test -p rex_e2e --lib -- --ignored
