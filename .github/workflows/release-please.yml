name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr_branch: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).headBranchName || '' }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-lockfiles:
    name: Update lockfiles on release PR
    needs: release-please
    if: ${{ needs.release-please.outputs.pr_branch != '' && needs.release-please.outputs.releases_created != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.pr_branch }}
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Update package-lock.json files
        run: |
          # Packages whose version is bumped by release-please
          for dir in packages/rex packages/create-rex-app; do
            if [ -f "$dir/package-lock.json" ]; then
              echo "Updating $dir/package-lock.json..."
              npm install --prefix "$dir" --package-lock-only --ignore-scripts
            fi
          done
          # Fixtures that depend on @limlabs/rex via file: reference
          for dir in fixtures/app-router fixtures/basic fixtures/custom-server fixtures/mcp fixtures/mdx fixtures/tailwind; do
            if [ -f "$dir/package-lock.json" ]; then
              echo "Updating $dir/package-lock.json..."
              npm install --prefix "$dir" --package-lock-only --ignore-scripts
            fi
          done

      - name: Commit updated lockfiles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock '*/package-lock.json' 'packages/*/package-lock.json'
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "chore: update lockfiles"
            git push
          fi

  build-linux:
    name: Build Linux (x86_64)
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build
        run: cargo build --release --bin rex

      - name: Package
        run: |
          cd target/release
          tar czf rex-linux-x86_64.tar.gz rex
          sha256sum rex-linux-x86_64.tar.gz > rex-linux-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-linux-x86_64
          path: |
            target/release/rex-linux-x86_64.tar.gz
            target/release/rex-linux-x86_64.tar.gz.sha256

  build-linux-arm64:
    name: Build Linux (ARM64)
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-arm64-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-release-

      - name: Build
        run: cargo build --release --bin rex

      - name: Package
        run: |
          cd target/release
          tar czf rex-linux-arm64.tar.gz rex
          sha256sum rex-linux-arm64.tar.gz > rex-linux-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-linux-arm64
          path: |
            target/release/rex-linux-arm64.tar.gz
            target/release/rex-linux-arm64.tar.gz.sha256

  build-macos-arm64:
    name: Build macOS (ARM64)
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-arm64-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-release-

      - name: Build
        run: cargo build --release --bin rex --target aarch64-apple-darwin

      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf rex-macos-arm64.tar.gz rex
          shasum -a 256 rex-macos-arm64.tar.gz > rex-macos-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/rex-macos-arm64.tar.gz
            target/aarch64-apple-darwin/release/rex-macos-arm64.tar.gz.sha256

  build-macos-x86_64:
    name: Build macOS (x86_64)
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install x86_64 target
        run: rustup target add x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-x86-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-x86-cargo-release-

      - name: Build
        run: cargo build --release --bin rex --target x86_64-apple-darwin

      - name: Package
        run: |
          cd target/x86_64-apple-darwin/release
          tar czf rex-macos-x86_64.tar.gz rex
          shasum -a 256 rex-macos-x86_64.tar.gz > rex-macos-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-macos-x86_64
          path: |
            target/x86_64-apple-darwin/release/rex-macos-x86_64.tar.gz
            target/x86_64-apple-darwin/release/rex-macos-x86_64.tar.gz.sha256

  docker:
    name: Docker
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/limlabs/rex:${{ steps.version.outputs.version }}
            ghcr.io/limlabs/rex:latest

  npm-publish:
    name: npm Publish
    needs: [release-please, build-linux, build-linux-arm64, build-macos-arm64, build-macos-x86_64]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          pattern: rex-*
          path: artifacts

      - name: Inject binaries into platform packages
        run: |
          VERSION="${TAG#v}"

          # darwin-arm64
          mkdir -p packages/rex-darwin-arm64/bin
          tar xzf artifacts/rex-macos-arm64/rex-macos-arm64.tar.gz -C packages/rex-darwin-arm64/bin
          chmod +x packages/rex-darwin-arm64/bin/rex

          # darwin-x64
          mkdir -p packages/rex-darwin-x64/bin
          tar xzf artifacts/rex-macos-x86_64/rex-macos-x86_64.tar.gz -C packages/rex-darwin-x64/bin
          chmod +x packages/rex-darwin-x64/bin/rex

          # linux-x64
          mkdir -p packages/rex-linux-x64/bin
          tar xzf artifacts/rex-linux-x86_64/rex-linux-x86_64.tar.gz -C packages/rex-linux-x64/bin
          chmod +x packages/rex-linux-x64/bin/rex

          # linux-arm64
          mkdir -p packages/rex-linux-arm64/bin
          tar xzf artifacts/rex-linux-arm64/rex-linux-arm64.tar.gz -C packages/rex-linux-arm64/bin
          chmod +x packages/rex-linux-arm64/bin/rex
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - name: Sync versions from release tag
        run: |
          VERSION="${TAG#v}"
          for pkg in packages/rex-darwin-arm64 packages/rex-darwin-x64 packages/rex-linux-x64 packages/rex-linux-arm64; do
            cd "$pkg"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd "$GITHUB_WORKSPACE"
          done
          cd packages/rex
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - name: Publish platform packages
        run: |
          for pkg in packages/rex-darwin-arm64 packages/rex-darwin-x64 packages/rex-linux-x64 packages/rex-linux-arm64; do
            echo "Publishing $pkg..."
            cd "$pkg"
            npm publish --access public
            cd "$GITHUB_WORKSPACE"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for platform packages on registry
        run: |
          VERSION="${TAG#v}"
          for pkg in @limlabs/rex-darwin-arm64 @limlabs/rex-darwin-x64 @limlabs/rex-linux-x64 @limlabs/rex-linux-arm64; do
            echo "Waiting for $pkg@$VERSION..."
            for i in $(seq 1 30); do
              if npm view "$pkg@$VERSION" version 2>/dev/null; then
                echo "$pkg@$VERSION is available"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Timed out waiting for $pkg@$VERSION"
                exit 1
              fi
              sleep 10
            done
          done
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - name: Install dependencies & publish main package
        run: |
          cd packages/rex
          npm install
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  upload-release-assets:
    name: Upload Release Assets
    needs: [release-please, build-linux, build-linux-arm64, build-macos-arm64, build-macos-x86_64]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rex-*
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            artifacts/rex-linux-x86_64/rex-linux-x86_64.tar.gz
            artifacts/rex-linux-x86_64/rex-linux-x86_64.tar.gz.sha256
            artifacts/rex-linux-arm64/rex-linux-arm64.tar.gz
            artifacts/rex-linux-arm64/rex-linux-arm64.tar.gz.sha256
            artifacts/rex-macos-arm64/rex-macos-arm64.tar.gz
            artifacts/rex-macos-arm64/rex-macos-arm64.tar.gz.sha256
            artifacts/rex-macos-x86_64/rex-macos-x86_64.tar.gz
            artifacts/rex-macos-x86_64/rex-macos-x86_64.tar.gz.sha256

  cargo-publish:
    name: Cargo Publish
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish crates
        run: |
          # No-dep crates first (parallel-safe but sequential for simplicity)
          cargo publish -p rex_image --no-verify
          cargo publish -p rex_core --no-verify
          sleep 30  # wait for crates.io index
          # Crates that depend on rex_core
          cargo publish -p rex_router --no-verify
          cargo publish -p rex_v8 --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  smoke-test:
    name: Smoke Test
    needs: [release-please, npm-publish]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    uses: ./.github/workflows/smoke-test.yml
    with:
      version: ${{ needs.release-please.outputs.tag_name }}

  deploy-railway:
    name: Deploy to Railway
    needs: [release-please, docker]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    environment: railway-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Pin Rex version in Dockerfile
        run: |
          VERSION="${TAG#v}"
          sed -i "s|ARG REX_VERSION=latest|ARG REX_VERSION=$VERSION|" fixtures/railway/Dockerfile
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}"
        working-directory: fixtures/railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  smoke-test-railway:
    name: Smoke Test (Railway)
    needs: [release-please, deploy-railway]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    environment: railway-production
    steps:
      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for Railway deployment..."
          for i in $(seq 1 60); do
            if curl -sf "${{ secrets.RAILWAY_URL }}" > /dev/null 2>&1; then
              echo "Deployment is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Railway deployment failed to become ready within 60s"
              exit 1
            fi
            sleep 5
          done

      - name: Verify HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ secrets.RAILWAY_URL }}")
          echo "GET / → HTTP $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Expected HTTP 200, got $STATUS"
            exit 1
          fi

  cleanup-beta-releases:
    name: Clean up beta releases
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete beta pre-releases for this version
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          gh release list --json tagName,isPrerelease \
            -q ".[] | select(.isPrerelease and (.tagName | startswith(\"v${VERSION}-beta.\"))) | .tagName" \
          | while read -r tag; do
            echo "Cleaning up beta release: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
