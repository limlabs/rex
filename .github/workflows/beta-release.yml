name: Beta Release

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-release-pr:
    # Only run for release-please PRs
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      beta_version: ${{ steps.version.outputs.beta_version }}
      beta_tag: ${{ steps.version.outputs.beta_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          BETA_VERSION="${VERSION}-beta.${{ github.run_number }}"
          BETA_TAG="v${BETA_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "beta_version=$BETA_VERSION" >> "$GITHUB_OUTPUT"
          echo "beta_tag=$BETA_TAG" >> "$GITHUB_OUTPUT"
          echo "::notice::Beta version: $BETA_VERSION (tag: $BETA_TAG)"

  build-linux:
    name: Build Linux (x86_64)
    needs: check-release-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-beta-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-beta-

      - name: Build
        run: cargo build --release --bin rex

      - name: Package
        run: |
          cd target/release
          tar czf rex-linux-x86_64.tar.gz rex
          sha256sum rex-linux-x86_64.tar.gz > rex-linux-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-linux-x86_64
          path: |
            target/release/rex-linux-x86_64.tar.gz
            target/release/rex-linux-x86_64.tar.gz.sha256

  build-linux-arm64:
    name: Build Linux (ARM64)
    needs: check-release-pr
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-arm64-cargo-beta-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-beta-

      - name: Build
        run: cargo build --release --bin rex

      - name: Package
        run: |
          cd target/release
          tar czf rex-linux-arm64.tar.gz rex
          sha256sum rex-linux-arm64.tar.gz > rex-linux-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-linux-arm64
          path: |
            target/release/rex-linux-arm64.tar.gz
            target/release/rex-linux-arm64.tar.gz.sha256

  build-macos-arm64:
    name: Build macOS (ARM64)
    needs: check-release-pr
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-arm64-cargo-beta-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-beta-

      - name: Build
        run: cargo build --release --bin rex --target aarch64-apple-darwin

      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf rex-macos-arm64.tar.gz rex
          shasum -a 256 rex-macos-arm64.tar.gz > rex-macos-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/rex-macos-arm64.tar.gz
            target/aarch64-apple-darwin/release/rex-macos-arm64.tar.gz.sha256

  build-macos-x86_64:
    name: Build macOS (x86_64)
    needs: check-release-pr
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install x86_64 target
        run: rustup target add x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-x86-cargo-beta-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-x86-cargo-beta-

      - name: Build
        run: cargo build --release --bin rex --target x86_64-apple-darwin

      - name: Package
        run: |
          cd target/x86_64-apple-darwin/release
          tar czf rex-macos-x86_64.tar.gz rex
          shasum -a 256 rex-macos-x86_64.tar.gz > rex-macos-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-macos-x86_64
          path: |
            target/x86_64-apple-darwin/release/rex-macos-x86_64.tar.gz
            target/x86_64-apple-darwin/release/rex-macos-x86_64.tar.gz.sha256

  docker:
    name: Docker (beta)
    needs: check-release-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/limlabs/rex:${{ needs.check-release-pr.outputs.beta_version }}
            ghcr.io/limlabs/rex:beta

  npm-publish:
    name: npm Publish (beta)
    needs: check-release-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: cd packages/rex && npm install

      - name: Set beta version
        run: |
          cd packages/rex
          npm version "${{ needs.check-release-pr.outputs.beta_version }}" --no-git-tag-version

      - name: Publish
        run: cd packages/rex && npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-beta-release:
    name: GitHub Pre-Release
    needs: [check-release-pr, build-linux, build-linux-arm64, build-macos-arm64, build-macos-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean up old beta releases
        run: |
          VERSION="${{ needs.check-release-pr.outputs.version }}"
          gh release list --json tagName,isPrerelease \
            -q ".[] | select(.isPrerelease and (.tagName | startswith(\"v${VERSION}-beta.\"))) | .tagName" \
          | while read -r tag; do
            echo "Deleting old beta: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          pattern: rex-*
          path: artifacts

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release-pr.outputs.beta_tag }}
          target_commitish: ${{ github.event.pull_request.head.sha }}
          name: Rex ${{ needs.check-release-pr.outputs.beta_tag }}
          body: |
            **Beta pre-release for upcoming v${{ needs.check-release-pr.outputs.version }}**

            Install via npm:
            ```
            npm install @limlabs/rex@beta
            ```

            Docker:
            ```
            docker pull ghcr.io/limlabs/rex:beta
            ```
          prerelease: true
          files: |
            artifacts/rex-linux-x86_64/rex-linux-x86_64.tar.gz
            artifacts/rex-linux-x86_64/rex-linux-x86_64.tar.gz.sha256
            artifacts/rex-linux-arm64/rex-linux-arm64.tar.gz
            artifacts/rex-linux-arm64/rex-linux-arm64.tar.gz.sha256
            artifacts/rex-macos-arm64/rex-macos-arm64.tar.gz
            artifacts/rex-macos-arm64/rex-macos-arm64.tar.gz.sha256
            artifacts/rex-macos-x86_64/rex-macos-x86_64.tar.gz
            artifacts/rex-macos-x86_64/rex-macos-x86_64.tar.gz.sha256
