name: Beta Release

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths-ignore:
      - 'Cargo.lock'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-release-pr:
    # Only run for release-please PRs
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      beta_version: ${{ steps.version.outputs.beta_version }}
      beta_tag: ${{ steps.version.outputs.beta_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          BETA_VERSION="${VERSION}-beta.${{ github.run_number }}"
          BETA_TAG="v${BETA_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "beta_version=$BETA_VERSION" >> "$GITHUB_OUTPUT"
          echo "beta_tag=$BETA_TAG" >> "$GITHUB_OUTPUT"
          echo "::notice::Beta version: $BETA_VERSION (tag: $BETA_TAG)"

  build-linux:
    name: Build Linux (x86_64)
    needs: check-release-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-beta-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-beta-

      - name: Build
        run: cargo build --release --bin rex

      - name: Package
        run: |
          cd target/release
          tar czf rex-linux-x86_64.tar.gz rex
          sha256sum rex-linux-x86_64.tar.gz > rex-linux-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-linux-x86_64
          path: |
            target/release/rex-linux-x86_64.tar.gz
            target/release/rex-linux-x86_64.tar.gz.sha256

  build-linux-arm64:
    name: Build Linux (ARM64)
    needs: check-release-pr
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-arm64-cargo-beta-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-beta-

      - name: Build
        run: cargo build --release --bin rex

      - name: Package
        run: |
          cd target/release
          tar czf rex-linux-arm64.tar.gz rex
          sha256sum rex-linux-arm64.tar.gz > rex-linux-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-linux-arm64
          path: |
            target/release/rex-linux-arm64.tar.gz
            target/release/rex-linux-arm64.tar.gz.sha256

  build-macos-arm64:
    name: Build macOS (ARM64)
    needs: check-release-pr
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-arm64-cargo-beta-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-beta-

      - name: Build
        run: cargo build --release --bin rex --target aarch64-apple-darwin

      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf rex-macos-arm64.tar.gz rex
          shasum -a 256 rex-macos-arm64.tar.gz > rex-macos-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/rex-macos-arm64.tar.gz
            target/aarch64-apple-darwin/release/rex-macos-arm64.tar.gz.sha256

  build-macos-x86_64:
    name: Build macOS (x86_64)
    needs: check-release-pr
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install x86_64 target
        run: rustup target add x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-x86-cargo-beta-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-x86-cargo-beta-

      - name: Build
        run: cargo build --release --bin rex --target x86_64-apple-darwin

      - name: Package
        run: |
          cd target/x86_64-apple-darwin/release
          tar czf rex-macos-x86_64.tar.gz rex
          shasum -a 256 rex-macos-x86_64.tar.gz > rex-macos-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rex-macos-x86_64
          path: |
            target/x86_64-apple-darwin/release/rex-macos-x86_64.tar.gz
            target/x86_64-apple-darwin/release/rex-macos-x86_64.tar.gz.sha256

  docker:
    name: Docker (beta)
    needs: check-release-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/limlabs/rex:${{ needs.check-release-pr.outputs.beta_version }}
            ghcr.io/limlabs/rex:beta

  npm-publish:
    name: npm Publish (beta)
    needs: [check-release-pr, build-linux, build-linux-arm64, build-macos-arm64, build-macos-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          pattern: rex-*
          path: artifacts

      - name: Inject binaries into platform packages
        run: |
          # darwin-arm64
          mkdir -p packages/rex-darwin-arm64/bin
          tar xzf artifacts/rex-macos-arm64/rex-macos-arm64.tar.gz -C packages/rex-darwin-arm64/bin
          chmod +x packages/rex-darwin-arm64/bin/rex

          # darwin-x64
          mkdir -p packages/rex-darwin-x64/bin
          tar xzf artifacts/rex-macos-x86_64/rex-macos-x86_64.tar.gz -C packages/rex-darwin-x64/bin
          chmod +x packages/rex-darwin-x64/bin/rex

          # linux-x64
          mkdir -p packages/rex-linux-x64/bin
          tar xzf artifacts/rex-linux-x86_64/rex-linux-x86_64.tar.gz -C packages/rex-linux-x64/bin
          chmod +x packages/rex-linux-x64/bin/rex

          # linux-arm64
          mkdir -p packages/rex-linux-arm64/bin
          tar xzf artifacts/rex-linux-arm64/rex-linux-arm64.tar.gz -C packages/rex-linux-arm64/bin
          chmod +x packages/rex-linux-arm64/bin/rex

      - name: Set beta versions
        run: |
          BETA_VERSION="${{ needs.check-release-pr.outputs.beta_version }}"
          for pkg in packages/rex-darwin-arm64 packages/rex-darwin-x64 packages/rex-linux-x64 packages/rex-linux-arm64; do
            cd "$pkg"
            npm version "$BETA_VERSION" --no-git-tag-version
            cd "$GITHUB_WORKSPACE"
          done
          cd packages/rex
          npm version "$BETA_VERSION" --no-git-tag-version

      - name: Rewrite optionalDependencies to beta version
        run: |
          BETA_VERSION="${{ needs.check-release-pr.outputs.beta_version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/rex/package.json', 'utf8'));
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '$BETA_VERSION';
            }
            fs.writeFileSync('packages/rex/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform packages (beta)
        run: |
          for pkg in packages/rex-darwin-arm64 packages/rex-darwin-x64 packages/rex-linux-x64 packages/rex-linux-arm64; do
            echo "Publishing $pkg (beta)..."
            cd "$pkg"
            npm publish --access public --tag beta
            cd "$GITHUB_WORKSPACE"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for platform packages on registry
        run: |
          BETA_VERSION="${{ needs.check-release-pr.outputs.beta_version }}"
          for pkg in @limlabs/rex-darwin-arm64 @limlabs/rex-darwin-x64 @limlabs/rex-linux-x64 @limlabs/rex-linux-arm64; do
            echo "Waiting for $pkg@$BETA_VERSION..."
            for i in $(seq 1 30); do
              if npm view "$pkg@$BETA_VERSION" version 2>/dev/null; then
                echo "$pkg@$BETA_VERSION is available"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Timed out waiting for $pkg@$BETA_VERSION"
                exit 1
              fi
              sleep 10
            done
          done

      - name: Install dependencies & publish main package (beta)
        run: |
          cd packages/rex
          npm install
          npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke-test:
    name: Smoke Test
    needs: [check-release-pr, npm-publish]
    uses: ./.github/workflows/smoke-test.yml
    with:
      version: ${{ needs.check-release-pr.outputs.beta_version }}

  deploy-railway:
    name: Deploy to Railway (beta)
    needs: [check-release-pr, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Pin Rex version in Dockerfile
        run: |
          BETA_VERSION="${{ needs.check-release-pr.outputs.beta_version }}"
          sed -i "s|ARG REX_VERSION=latest|ARG REX_VERSION=$BETA_VERSION|" fixtures/railway/Dockerfile

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}"
        working-directory: fixtures/railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  smoke-test-railway:
    name: Smoke Test (Railway)
    needs: deploy-railway
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for Railway deployment..."
          for i in $(seq 1 60); do
            if curl -sf "${{ secrets.RAILWAY_URL }}" > /dev/null 2>&1; then
              echo "Deployment is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Railway deployment failed to become ready within 60s"
              exit 1
            fi
            sleep 5
          done

      - name: Verify HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ secrets.RAILWAY_URL }}")
          echo "GET / → HTTP $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Expected HTTP 200, got $STATUS"
            exit 1
          fi

  create-beta-release:
    name: GitHub Pre-Release
    needs: [check-release-pr, build-linux, build-linux-arm64, build-macos-arm64, build-macos-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean up old beta releases
        run: |
          VERSION="${{ needs.check-release-pr.outputs.version }}"
          gh release list --json tagName,isPrerelease \
            -q ".[] | select(.isPrerelease and (.tagName | startswith(\"v${VERSION}-beta.\"))) | .tagName" \
          | while read -r tag; do
            echo "Deleting old beta: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          pattern: rex-*
          path: artifacts

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release-pr.outputs.beta_tag }}
          target_commitish: ${{ github.event.pull_request.head.sha }}
          name: Rex ${{ needs.check-release-pr.outputs.beta_tag }}
          body: |
            **Beta pre-release for upcoming v${{ needs.check-release-pr.outputs.version }}**

            Install via npm:
            ```
            npm install @limlabs/rex@beta
            ```

            Docker:
            ```
            docker pull ghcr.io/limlabs/rex:beta
            ```
          prerelease: true
          files: |
            artifacts/rex-linux-x86_64/rex-linux-x86_64.tar.gz
            artifacts/rex-linux-x86_64/rex-linux-x86_64.tar.gz.sha256
            artifacts/rex-linux-arm64/rex-linux-arm64.tar.gz
            artifacts/rex-linux-arm64/rex-linux-arm64.tar.gz.sha256
            artifacts/rex-macos-arm64/rex-macos-arm64.tar.gz
            artifacts/rex-macos-arm64/rex-macos-arm64.tar.gz.sha256
            artifacts/rex-macos-x86_64/rex-macos-x86_64.tar.gz
            artifacts/rex-macos-x86_64/rex-macos-x86_64.tar.gz.sha256
