name: Setup
description: Shared CI setup — Rust cache, Node, fixture deps, and optional Python.

inputs:
  save-cache:
    description: Whether to save the Rust cache (only on main)
    default: "false"
  python:
    description: Set up Python (for rex_python tests)
    default: "false"

runs:
  using: composite
  steps:
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ci
        save-if: ${{ inputs.save-cache }}

    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install fixture dependencies
      shell: bash
      run: cd fixtures/basic && npm install

    - uses: actions/setup-python@v5
      if: inputs.python == 'true'
      with:
        python-version: "3.12"

    - name: Install maturin and pytest
      if: inputs.python == 'true'
      shell: bash
      run: pip install maturin pytest
