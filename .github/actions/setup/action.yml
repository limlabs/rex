name: Setup
description: Shared CI setup — Rust cache, Node, and fixture deps.

inputs:
  save-cache:
    description: Whether to save the Rust cache (only on main)
    default: "false"

runs:
  using: composite
  steps:
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ci
        save-if: ${{ inputs.save-cache }}

    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install fixture dependencies
      shell: bash
      run: cd fixtures/basic && npm install
