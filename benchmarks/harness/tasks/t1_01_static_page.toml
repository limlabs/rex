[task]
id = "t1-01"
tier = 1
name = "Static page"
prompt = """
Create a page at /about that displays:
- An h1 heading with the text "About Us"
- A paragraph with the text "Learn more about our company."

The page should be server-rendered (the content must appear in the raw HTML).
"""

[starter]
template = "rex"

[checks]
build = true
serve = true

[[checks.http]]
path = "/about"
status = 200

[[checks.ssr]]
path = "/about"
contains = ["About Us", "Learn more about our company."]

[[checks.dom]]
path = "/about"
selector = "h1"
text = "About Us"

[[checks.dom]]
path = "/about"
selector = "p"
contains = "Learn more about our company."
